name: pecause

services:
  api:
   # build:
     # context: .
     # dockerfile: Dockerfile
    image: pecause:latest  # 使用本地构建的镜像
    # 与常见 x86 云主机一致；在 Mac(ARM) 上 buildx/save 时须显式 --platform linux/amd64
    platform: linux/amd64
    container_name: pecause-api
    ports:
      - 4182:3080
    depends_on:
      mongodb:
        condition: service_healthy
      pipeline-svc:
        condition: service_healthy
      vectordb:
        condition: service_healthy
    restart: always
    networks:
      - pecause-network
    extra_hosts:
    - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=3080
      - NODE_ENV=production
      - MONGO_URI=mongodb://pecause-mongodb:27017/pecauseAi
      - PIPELINE_SVC_URL=http://pipeline-svc:8001
      - CONFIG_PATH=/app/Because.yaml
      - VECTOR_DB_HOST=vectordb
      - VECTOR_DB_PORT=5432
      - VECTOR_DB_NAME=pecause_vector
      - VECTOR_DB_USER=pecause_user
      - VECTOR_DB_PASSWORD=pecause_password
      # MeiliSearch 已禁用
      # - MEILI_HOST=http://meilisearch:7700
      # - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      # - SEARCH=true
      # RAG API 已本地化，使用 ONNX 模型，不再需要外部服务
      # - RAG_PORT=${RAG_PORT:-9102}
      # - RAG_API_URL=http://rag_api:8000
    volumes:
      - type: bind
        source: ./Because.yaml
        target: /app/Because.yaml
      - ./specs:/app/specs
      - ./images:/app/client/public/images
      - ./uploads:/app/uploads
      - ./logs:/app/api/logs
  pipeline-svc:
    image: pecause-pipeline-svc:latest
    platform: linux/amd64
    container_name: pecause-pipeline-svc
    restart: always
    networks:
      - pecause-network
    environment:
      - PIPELINE_DATA_DIR=/data/pipeline
    volumes:
      - ./pipeline-data:/data/pipeline
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8001/api/pipeline/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      # 首启导入较重或为弱机型时，25s 内未就绪会导致误判 unhealthy，拖累 api 启动
      start_period: 90s

  client:
    image: nginx:1.27.0-alpine
    platform: linux/amd64
    container_name: pecause-nginx
    ports:
      # 如果 80/443 端口被占用，可以改为其他端口，如 8180:80 和 8543:443
      # 当前使用 8180 和 8543 避免与系统服务冲突
      - 8180:80
      - 8543:443
    depends_on:
      api:
        condition: service_started
    restart: always
    networks:
      - pecause-network
    volumes:
      - ./client/nginx.conf:/etc/nginx/conf.d/default.conf
      
  mongodb:
    container_name: pecause-mongodb
    # ports:  # Uncomment this to access mongodb from outside docker, not safe for deployment
    #   - 27018:27017
    image: mongo
    platform: linux/amd64
    restart: always
    networks:
      - pecause-network
    volumes:
      - ./data-node-pecause:/data/db
    command: mongod --noauth --bind_ip_all
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
  # meilisearch:  # 已禁用MeiliSearch服务
  #   container_name: pecause-meilisearch
  #   image: getmeili/meilisearch:v1.12.3
  #   restart: always
  #   networks:
  #     - pecause-network
  #   # ports: # Uncomment this to access meilisearch from outside docker
  #   #   - 7700:7700 # if exposing these ports, make sure your master key is not the default value
  #   env_file:
  #     - .env
  #   environment:
  #     - MEILI_HTTP_ADDR=0.0.0.0:7700
  #     - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
  #     - MEILI_NO_ANALYTICS=true
  #   volumes:
  #     - ./meili_data_v1.12:/meili_data
  vectordb:
    container_name: pecause-vectordb
    image: pgvector/pgvector:0.8.0-pg15-trixie
    platform: linux/amd64
    environment:
      POSTGRES_DB: pecause_vector
      POSTGRES_USER: pecause_user
      POSTGRES_PASSWORD: pecause_password
    restart: always
    networks:
      - pecause-network
    volumes:
      - pgdata2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pecause_user -d pecause_vector"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
  # RAG API 服务已本地化，使用 ONNX 模型，不再需要外部服务
  # rag_api:
  #   container_name: pecause-rag-api
  #   image: ghcr.io/danny-avila/librechat-rag-api-dev:latest
  #   environment:
  #     - DB_HOST=vectordb
  #     - DB_PORT=5432
  #     - POSTGRES_DB=pecause_vector
  #     - POSTGRES_USER=pecause_user
  #     - POSTGRES_PASSWORD=pecause_password
  #   ports:
  #     - "${RAG_PORT:-9102}:8000"
  #   restart: always
  #   networks:
  #     - pecause-network
  #   depends_on:
  #     - vectordb
  #   env_file:
  #     - .env

networks:
  pecause-network:
    driver: bridge

volumes:
  pgdata2:
