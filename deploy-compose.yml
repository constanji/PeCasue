services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: because:latest  # 使用本地构建的镜像
    container_name: Because-API
    ports:
      - 4082:3080
    depends_on:
      mongodb:
        condition: service_healthy
      # meilisearch:
      #   condition: service_healthy
      vectordb:
        condition: service_healthy
      # RAG API 已本地化，使用 ONNX 模型，不再需要外部服务
      # - rag_api
    restart: always
    networks:
      - because-network
    extra_hosts:
    - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=3080
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/BecauseAi
      - MONGO_SERVER_SELECTION_TIMEOUT_MS=30000
      - MONGO_CONNECT_TIMEOUT_MS=30000
      - MONGO_SOCKET_TIMEOUT_MS=45000
      # MeiliSearch 已禁用，以下配置不再需要
      # - MEILI_HOST=http://meilisearch:7700
      # - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-masterKey}
      - SEARCH=false
      # RAG API 已本地化，使用 ONNX 模型，不再需要外部服务
      # - RAG_PORT=${RAG_PORT:-9002}
      # - RAG_API_URL=http://rag_api:8000
    volumes:
      - type: bind
        source: ./Because.yaml
        target: /app/Because.yaml
      - ./specs:/app/specs
      - ./images:/app/client/public/images
      - ./uploads:/app/uploads
      - ./logs:/app/api/logs

  client:
    image: nginx:1.27.0-alpine
    container_name: Because-NGINX
    ports:
      # 如果 80/443 端口被占用，可以改为其他端口，如 8080:80 和 8443:443
      # 当前使用 8080 和 8443 避免与系统服务冲突
      - 8080:80
      - 8443:443
    depends_on:
      - api
    restart: always
    networks:
      - because-network
    volumes:
      - ./client/nginx.conf:/etc/nginx/conf.d/default.conf
      
  mongodb:
    container_name: Because-MongoDB
    # ports:  # Uncomment this to access mongodb from outside docker, not safe in deployment
    #   - 27018:27017
    image: mongo
    restart: always
    networks:
      - because-network
    volumes:
      - ./data-node:/data/db
    command: mongod --noauth --port 27017 --bind_ip_all
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
  # MeiliSearch 服务已禁用（搜索功能关闭）
  # meilisearch:
  #   container_name: Because-Meilisearch
  #   image: getmeili/meilisearch:v1.12.3
  #   restart: always
  #   networks:
  #     - because-network
  #   # ports: # Uncomment this to access meilisearch from outside docker
  #   #   - 7700:7700 # if exposing these ports, make sure your master key is not the default value
  #   env_file:
  #     - .env
  #   environment:
  #     - MEILI_HTTP_ADDR=0.0.0.0:7700
  #     - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-masterKey}
  #     - MEILI_NO_ANALYTICS=true
  #   volumes:
  #     - ./meili_data_v1.12:/meili_data
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -f http://localhost:7700/health || exit 1"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 10
  #     start_period: 10s
  vectordb:
    container_name: Because-VectorDB
    image: pgvector/pgvector:0.8.0-pg15-trixie
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    restart: always
    networks:
      - because-network
    volumes:
      - pgdata2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydatabase"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
  # RAG API 服务已本地化，使用 ONNX 模型，不再需要外部服务
  # rag_api:
  #   container_name: Because-RAG-API
  #   image: ghcr.io/danny-avila/librechat-rag-api-dev:latest
  #   environment:
  #     - DB_HOST=vectordb
  #     - DB_PORT=5432
  #     - POSTGRES_DB=mydatabase
  #     - POSTGRES_USER=myuser
  #     - POSTGRES_PASSWORD=mypassword
  #   ports:
  #     - "${RAG_PORT:-9002}:8000"
  #   restart: always
  #   networks:
  #     - because-network
  #   depends_on:
  #     - vectordb
  #   env_file:
  #     - .env

networks:
  because-network:
    driver: bridge

volumes:
  pgdata2:
