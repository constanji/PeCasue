# PeCause 服务器部署栈：与仓库根目录 deploy-compose.yml 对齐。
# 使用方式：在 Sever 目录下执行
#   docker compose -f deploy-compose.yml up -d
#
# 依赖（见 deploy.sh）：
#   - 镜像：pecause:latest、pecause-pipeline-svc:latest（docker load / 私有仓库拉取）
#   - 第三方：mongo / nginx / pgvector 须在 x86 服务器上用 amd64 镜像（Mac ARM 打包须 docker pull --platform linux/amd64）
#   - 文件：.env、Because.yaml；目录见 deploy.sh 初始化

name: pecause

services:
  api:
    image: pecause:latest
    platform: linux/amd64
    container_name: pecause-api
    network_mode: host
    depends_on:
      mongodb:
        condition: service_healthy
      pipeline-svc:
        condition: service_healthy
      vectordb:
        condition: service_healthy
    restart: always
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=4182
      - NODE_ENV=production
      - MONGO_URI=mongodb://localhost:27017/pecauseAi
      - PIPELINE_SVC_URL=http://localhost:8001
      - CONFIG_PATH=/app/Because.yaml
      - VECTOR_DB_HOST=localhost
      - VECTOR_DB_PORT=5432
      - VECTOR_DB_NAME=pecause_vector
      - VECTOR_DB_USER=pecause_user
      - VECTOR_DB_PASSWORD=pecause_password
    volumes:
      - type: bind
        source: ./Because.yaml
        target: /app/Because.yaml
      - ./specs:/app/specs
      - ./images:/app/client/public/images
      - ./uploads:/app/uploads
      - ./logs:/app/api/logs

  pipeline-svc:
    image: pecause-pipeline-svc:latest
    platform: linux/amd64
    container_name: pecause-pipeline-svc
    network_mode: host
    restart: always
    environment:
      - PIPELINE_DATA_DIR=/data/pipeline
    volumes:
      - ./pipeline-data:/data/pipeline
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8001/api/pipeline/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 90s

  client:
    image: nginx:1.27.0-alpine
    platform: linux/amd64
    container_name: pecause-nginx
    ports:
      - 8180:80
      - 8543:443
    depends_on:
      api:
        condition: service_started
    restart: always
    networks:
      - pecause-network
    volumes:
      - ./client/nginx.conf:/etc/nginx/conf.d/default.conf

  mongodb:
    container_name: pecause-mongodb
    image: mongo
    platform: linux/amd64
    restart: always
    networks:
      - pecause-network
    ports:
      - 27017:27017
    volumes:
      - ./data-node-pecause:/data/db
    command: mongod --noauth --bind_ip_all
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  vectordb:
    container_name: pecause-vectordb
    image: pgvector/pgvector:0.8.0-pg15-trixie
    platform: linux/amd64
    ports:
      - 5432:5432
    environment:
      POSTGRES_DB: pecause_vector
      POSTGRES_USER: pecause_user
      POSTGRES_PASSWORD: pecause_password
    restart: always
    networks:
      - pecause-network
    volumes:
      - pgdata2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pecause_user -d pecause_vector"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  pecause-network:
    driver: bridge

volumes:
  pgdata2: