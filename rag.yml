version: '3.8'

services:
  vectordb:
    image: pgvector/pgvector:0.8.0-pg15-trixie
    environment:
      POSTGRES_DB: pecause_vector
      POSTGRES_USER: pecause_user
      POSTGRES_PASSWORD: pecause_password
    volumes:
      - pgdata2:/var/lib/postgresql/data
    ports:
      - "5444:5432"
    networks:
      - because_default  # 使用 docker-compose.yml 的默认网络

  # RAG API 服务已本地化，使用 ONNX 模型，不再需要外部服务
  # rag_api:
  #   image: ghcr.io/danny-avila/librechat-rag-api-dev:latest
  #   environment:
  #     - DB_HOST=vectordb
  #     - DB_PORT=5432
  #     - POSTGRES_DB=pecause_vector
  #     - POSTGRES_USER=pecause_user
  #     - POSTGRES_PASSWORD=pecause_password
  #   ports:
  #     - "${RAG_PORT:-9102}:8000"
  #   depends_on:
  #     - vectordb
  #   env_file:
  #     - .env
  #   networks:
  #     - because_default  # 使用 docker-compose.yml 的默认网络

volumes:
  pgdata2:

networks:
  because_default:
    external: true  # 使用已存在的网络
