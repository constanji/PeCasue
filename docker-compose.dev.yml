# Docker 开发模式配置
# 支持热重载，修改代码后自动刷新，无需重新构建镜像
# 使用方法: docker-compose -f docker-compose.dev.yml up

name: pecause-dev

services:
  # 后端开发服务
  backend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: pecause-backend-dev
    ports:
      - "${API_PORT:-1245}:3080"
    depends_on:
      - mongodb
      - meilisearch
    networks:
      - pecause-dev-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=3080
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongodb:27017/pecauseAi  # 容器内部使用 27017，外部映射到 27044
      - MEILI_HOST=http://meilisearch:7700
      - BECAUSE_LOG_DIR=/app/api/logs
      - CONFIG_PATH=/app/Because.yaml
      - DOMAIN_CLIENT=http://pecause.localhost:4614
      - DOMAIN_SERVER=http://pecause.localhost:1245
      - ENDPOINTS=agents  # 只启用 agents 标准端点，自定义端点（deepseek、modelscope）会自动加载
    volumes:
      # 挂载源代码以实现热重载
      - .:/app:cached
      # 保护 node_modules，避免本地覆盖容器中的依赖
      - /app/node_modules
      - /app/client/node_modules
      - /app/api/node_modules
      - /app/packages/data-provider/node_modules
      - /app/packages/data-schemas/node_modules
      - /app/packages/api/node_modules
      - /app/packages/client/node_modules
      - /app/agents-because/node_modules
      # 配置文件和数据
      - ./Because.yaml:/app/Because.yaml
      - ./images:/app/client/public/images
      - ./uploads:/app/uploads
      - ./logs:/app/api/logs
    command: npm run backend:dev
    restart: unless-stopped

  # 前端开发服务 (Vite 开发服务器)
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: pecause-frontend-dev
    ports:
      - "4614:3090"
    depends_on:
      - backend-dev
    networks:
      - pecause-dev-network
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - HOST=0.0.0.0
      - PORT=3090
      - BACKEND_PORT=3080
      - BACKEND_HOST=backend-dev
      - VITE_API_BASE_URL=http://backend-dev:3080
    volumes:
      # 挂载源代码以实现热重载
      - .:/app:cached
      # 保护 node_modules，避免本地覆盖容器中的依赖
      - /app/node_modules
      - /app/client/node_modules
      - /app/api/node_modules
      - /app/packages/data-provider/node_modules
      - /app/packages/data-schemas/node_modules
      - /app/packages/api/node_modules
      - /app/packages/client/node_modules
      - /app/agents-because/node_modules
    command: npm run frontend:dev
    restart: unless-stopped

  # MongoDB 数据库（与生产环境共享数据）
  mongodb:
    container_name: pecause-mongodb-dev
    image: mongo
    restart: unless-stopped
    networks:
      - pecause-dev-network
    ports:
      - "27044:27017"
    volumes:
      - ./data-node-pecause:/data/db
    command: mongod --noauth --port 27017 --bind_ip_all

  # Meilisearch 搜索服务
  meilisearch:
    container_name: pecause-meilisearch-dev
    image: getmeili/meilisearch:v1.12.3
    restart: unless-stopped
    networks:
      - pecause-dev-network
    ports:
      - "${MEILI_PORT:-8801}:7700"
    env_file:
      - .env
    environment:
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_NO_ANALYTICS=true
    volumes:
      - ./meili_data_v1.12:/meili_data

  # 可选的 VectorDB (如果需要 RAG 功能)
  # vectordb:
  #   container_name: pecause-vectordb-dev
  #   image: pgvector/pgvector:0.8.0-pg15-trixie
  #   environment:
  #     POSTGRES_DB: pecause_vector
  #     POSTGRES_USER: pecause_user
  #     POSTGRES_PASSWORD: pecause_password
  #   restart: unless-stopped
  #   networks:
  #     - pecause-dev-network
  #   volumes:
  #     - pgdata2-dev:/var/lib/postgresql/data

  # 可选的 RAG API (如果需要 RAG 功能)
  # rag_api:
  #   container_name: pecause-rag-api-dev
  #   image: ghcr.io/constanji/because-rag-api-dev-lite:latest
  #   environment:
  #     - DB_HOST=vectordb
  #     - RAG_PORT=${RAG_PORT:-9101}
  #   restart: unless-stopped
  #   networks:
  #     - pecause-dev-network
  #   depends_on:
  #     - vectordb
  #   env_file:
  #     - .env

networks:
  pecause-dev-network:
    driver: bridge

volumes:
  pgdata2-dev:
